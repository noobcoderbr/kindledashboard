name: Update Time

on:
  schedule:
    - cron: '0 * * * *'

  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update page
        run: |
          echo "<!DOCTYPE html>
          <html>
          <body>
          <h1>Meu Kindle Dashboard</h1>
          <p>Última atualização:</p>
          <p>$(date)</p>
          </body>
          </html>" > index.html

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add index.html

          git commit -m "Update time" || exit 0

          git push
