<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kindle Events — Admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f5f7;
    color: #1d1d1f;
    min-height: 100vh;
  }

  header {
    background: #1d1d1f;
    color: #fff;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  header span { font-size: 13px; opacity: 0.5; }

  .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    background: #e5e5ea;
    border-radius: 10px;
    padding: 3px;
    width: fit-content;
  }
  .tab {
    padding: 6px 16px;
    border-radius: 8px;
    border: none;
    background: transparent;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: #6e6e73;
    transition: all .15s;
  }
  .tab.active {
    background: #fff;
    color: #1d1d1f;
    box-shadow: 0 1px 3px rgba(0,0,0,.12);
  }

  /* Event list */
  .event-list { display: flex; flex-direction: column; gap: 10px; }

  .event-card {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
    cursor: pointer;
    transition: box-shadow .15s;
  }
  .event-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.12); }

  .event-card.selected { box-shadow: 0 0 0 2px #0071e3; }

  .event-status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
  }
  .dot-approved { background: #30d158; }
  .dot-pending  { background: #ff9f0a; }
  .dot-rejected { background: #ff3b30; }

  .event-info { flex: 1; min-width: 0; }
  .event-title { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
  .event-meta  { font-size: 13px; color: #6e6e73; }
  .event-note  { font-size: 13px; color: #3a3a3c; margin-top: 4px; }

  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    flex-shrink: 0;
  }
  .badge-approved { background: #d1f5e0; color: #1a7a3c; }
  .badge-pending  { background: #fff3d1; color: #7a5a00; }
  .badge-rejected { background: #ffd6d4; color: #7a1a18; }

  /* Action buttons */
  .event-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .btn {
    padding: 6px 12px;
    border-radius: 8px;
    border: none;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .8; }
  .btn-approve  { background: #30d158; color: #fff; }
  .btn-reject   { background: #ff3b30; color: #fff; }
  .btn-edit     { background: #e5e5ea; color: #1d1d1f; }
  .btn-delete   { background: #ff3b30; color: #fff; }
  .btn-primary  { background: #0071e3; color: #fff; }
  .btn-secondary { background: #e5e5ea; color: #1d1d1f; }

  /* Form */
  .form-card {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
    margin-bottom: 20px;
  }
  .form-card h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-full { grid-column: 1 / -1; }

  label { display: block; font-size: 12px; font-weight: 600; color: #6e6e73; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .4px; }

  input[type="text"], input[type="date"], select, textarea {
    width: 100%;
    padding: 8px 12px;
    border: 1.5px solid #e5e5ea;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    background: #fafafa;
    transition: border-color .15s;
    outline: none;
  }
  input:focus, select:focus, textarea:focus { border-color: #0071e3; background: #fff; }
  textarea { resize: vertical; min-height: 60px; }

  .form-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }

  .type-toggle {
    display: flex;
    gap: 4px;
    background: #e5e5ea;
    border-radius: 8px;
    padding: 3px;
  }
  .type-toggle button {
    flex: 1;
    padding: 6px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    background: transparent;
    color: #6e6e73;
    transition: all .15s;
  }
  .type-toggle button.active {
    background: #fff;
    color: #1d1d1f;
    box-shadow: 0 1px 3px rgba(0,0,0,.12);
  }

  /* Export/import */
  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }
  .toolbar-spacer { flex: 1; }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 48px 16px;
    color: #6e6e73;
    font-size: 14px;
  }

  #jsonOutput {
    width: 100%;
    font-family: "SF Mono", monospace;
    font-size: 12px;
    padding: 12px;
    border-radius: 8px;
    border: 1.5px solid #e5e5ea;
    background: #1d1d1f;
    color: #e5e5ea;
    resize: vertical;
    min-height: 200px;
    margin-top: 8px;
  }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: #6e6e73;
    text-transform: uppercase;
    letter-spacing: .5px;
    margin: 20px 0 10px;
  }

  .hidden { display: none !important; }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .event-card { flex-wrap: wrap; }
    .event-actions { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <h1>Kindle Events</h1>
  <span>Gerenciador de Eventos</span>
</header>

<div class="container">

  <!-- Tab bar -->
  <div class="tabs">
    <button class="tab active" onclick="showTab('list')">Eventos</button>
    <button class="tab" onclick="showTab('add')">+ Adicionar</button>
    <button class="tab" onclick="showTab('export')">JSON</button>
  </div>

  <!-- LIST TAB -->
  <div id="tabList">

    <div class="toolbar">
      <button class="tab active" id="filterAll"      onclick="setFilter('all')">Todos</button>
      <button class="tab"        id="filterApproved" onclick="setFilter('approved')">Aprovados</button>
      <button class="tab"        id="filterPending"  onclick="setFilter('pending')">Pendentes</button>
      <div class="toolbar-spacer"></div>
      <a href="preview.html" target="_blank" class="btn btn-primary" style="text-decoration:none;padding:6px 14px;">Ver Preview →</a>
    </div>

    <div class="event-list" id="eventList"></div>

  </div>

  <!-- ADD/EDIT TAB -->
  <div id="tabAdd" class="hidden">
    <div class="form-card">
      <h2 id="formTitle">Novo Evento</h2>

      <div class="form-grid">

        <div class="form-full">
          <label>Tipo</label>
          <div class="type-toggle">
            <button id="typeOneoff"   class="active" onclick="setType('oneoff')">Data específica</button>
            <button id="typeRecurring"            onclick="setType('recurring')">Recorrente</button>
          </div>
        </div>

        <div class="form-full" id="dateField">
          <label>Data</label>
          <input type="date" id="fDate">
        </div>

        <div class="form-full hidden" id="dayField">
          <label>Dia da semana</label>
          <select id="fDay">
            <option value="monday">Segunda-feira</option>
            <option value="tuesday">Terça-feira</option>
            <option value="wednesday">Quarta-feira</option>
            <option value="thursday">Quinta-feira</option>
            <option value="friday">Sexta-feira</option>
            <option value="saturday">Sábado</option>
            <option value="sunday">Domingo</option>
          </select>
        </div>

        <div>
          <label>Título (PT)</label>
          <input type="text" id="fTitlePt" placeholder="ex: Feira de Antiguidades">
        </div>

        <div>
          <label>Título (EN)</label>
          <input type="text" id="fTitleEn" placeholder="ex: Antiques Fair">
        </div>

        <div>
          <label>Descrição (PT)</label>
          <textarea id="fNotePt" placeholder="Local, horário..."></textarea>
        </div>

        <div>
          <label>Descrição (EN)</label>
          <textarea id="fNoteEn" placeholder="Location, time..."></textarea>
        </div>

        <div>
          <label>Instagram</label>
          <input type="text" id="fInstagram" placeholder="@handle">
        </div>

        <div>
          <label>Status</label>
          <select id="fStatus">
            <option value="approved">Aprovado</option>
            <option value="pending">Pendente</option>
            <option value="rejected">Rejeitado</option>
          </select>
        </div>

      </div>

      <div class="form-actions">
        <button class="btn btn-secondary" onclick="cancelForm()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveEvent()">Salvar evento</button>
      </div>

    </div>
  </div>

  <!-- EXPORT TAB -->
  <div id="tabExport" class="hidden">
    <div class="form-card">
      <h2>Exportar / Importar JSON</h2>

      <p style="font-size:13px;color:#6e6e73;margin-bottom:12px;">
        Copie o JSON abaixo e salve em <code>events.json</code> no repositório.
        Ou cole um JSON existente para importar.
      </p>

      <textarea id="jsonOutput" spellcheck="false"></textarea>

      <div class="form-actions" style="margin-top:12px;">
        <button class="btn btn-secondary" onclick="copyJson()">Copiar</button>
        <button class="btn btn-primary"   onclick="importJson()">Importar JSON</button>
      </div>
    </div>
  </div>

</div>

<script>
// ── Inline seed data (same as events.json) ──────────────────────────────────
const SEED = [
  {
    "id": "1", "status": "approved", "type": "recurring", "recurringDay": "saturday", "date": null,
    "title_pt": "Feira de Antiguidades", "title_en": "Antiques Fair",
    "note_pt": "Praça XV de Novembro, das 9h às 17h", "note_en": "Praça XV de Novembro, 9am – 5pm",
    "instagram": "@feiraxv"
  },
  {
    "id": "2", "status": "approved", "type": "recurring", "recurringDay": "sunday", "date": null,
    "title_pt": "Feira Hippie de Ipanema", "title_en": "Ipanema Hippie Fair",
    "note_pt": "Praça General Osório, das 9h às 18h", "note_en": "Praça General Osório, 9am – 6pm",
    "instagram": "@feirahippie"
  },
  {
    "id": "3", "status": "approved", "type": "oneoff", "recurringDay": null, "date": "2026-09-13",
    "title_pt": "Rock in Rio", "title_en": "Rock in Rio",
    "note_pt": "Cidade do Rock, Barra da Tijuca", "note_en": "Cidade do Rock, Barra da Tijuca",
    "instagram": "@rockinrio"
  },
  {
    "id": "4", "status": "approved", "type": "recurring", "recurringDay": "saturday", "date": null,
    "title_pt": "Feira do Lavradio", "title_en": "Lavradio Antiques Street Fair",
    "note_pt": "Rua do Lavradio, Lapa, das 9h às 17h", "note_en": "Rua do Lavradio, Lapa, 9am – 5pm",
    "instagram": "@feiradolavradio"
  },
  {
    "id": "5", "status": "approved", "type": "recurring", "recurringDay": "sunday", "date": null,
    "title_pt": "Feira de São Cristóvão", "title_en": "São Cristóvão Fair",
    "note_pt": "Centro Luiz Gonzaga, das 10h às 22h", "note_en": "Centro Luiz Gonzaga, 10am – 10pm",
    "instagram": "@feirasaocristovao"
  },
  {
    "id": "6", "status": "approved", "type": "oneoff", "recurringDay": null, "date": "2026-07-04",
    "title_pt": "Festa Junina do SESC", "title_en": "SESC June Festival",
    "note_pt": "SESC Tijuca, a partir das 15h", "note_en": "SESC Tijuca, from 3pm",
    "instagram": "@sescrj"
  },
  {
    "id": "7", "status": "pending", "type": "oneoff", "recurringDay": null, "date": "2026-08-15",
    "title_pt": "Parada do Orgulho LGBT+", "title_en": "LGBT+ Pride Parade",
    "note_pt": "Copacabana, a partir das 14h", "note_en": "Copacabana, from 2pm",
    "instagram": "@paradariorj"
  }
];

// ── State ───────────────────────────────────────────────────────────────────
let events = JSON.parse(localStorage.getItem('kindle-events') || 'null') || SEED;
let filter = 'all';
let editingId = null;
let currentType = 'oneoff';

const DAY_NAMES = { monday:'Segunda', tuesday:'Terça', wednesday:'Quarta', thursday:'Quinta', friday:'Sexta', saturday:'Sábado', sunday:'Domingo' };

function save() { localStorage.setItem('kindle-events', JSON.stringify(events)); }

// ── Tabs ────────────────────────────────────────────────────────────────────
function showTab(tab) {
  ['list','add','export'].forEach(t => {
    document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.toggle('hidden', t !== tab);
  });
  document.querySelectorAll('.tabs .tab').forEach((el, i) => {
    el.classList.toggle('active', ['list','add','export'][i] === tab);
  });
  if (tab === 'export') renderJson();
}

// ── Filter ──────────────────────────────────────────────────────────────────
function setFilter(f) {
  filter = f;
  ['All','Approved','Pending'].forEach(n => {
    document.getElementById('filter'+n).classList.toggle('active', f === n.toLowerCase() || (f === 'all' && n === 'All'));
  });
  renderList();
}

// ── Render list ─────────────────────────────────────────────────────────────
function renderList() {
  const list = document.getElementById('eventList');
  const visible = events.filter(e => filter === 'all' || e.status === filter);

  if (!visible.length) {
    list.innerHTML = '<div class="empty">Nenhum evento encontrado.</div>';
    return;
  }

  list.innerHTML = visible.map(e => {
    const meta = e.type === 'recurring'
      ? `Toda ${DAY_NAMES[e.recurringDay] || e.recurringDay}`
      : e.date ? formatDate(e.date) : '—';

    return `
<div class="event-card" id="card-${e.id}">
  <div class="event-status-dot dot-${e.status}"></div>
  <div class="event-info">
    <div class="event-title">${e.title_pt}</div>
    <div class="event-meta">${meta} · ${e.instagram || ''}</div>
    <div class="event-note">${e.note_pt}</div>
  </div>
  <span class="badge badge-${e.status}">${statusLabel(e.status)}</span>
  <div class="event-actions">
    ${e.status !== 'approved' ? `<button class="btn btn-approve" onclick="setStatus('${e.id}','approved')">✓</button>` : ''}
    ${e.status !== 'rejected' ? `<button class="btn btn-reject"  onclick="setStatus('${e.id}','rejected')">✗</button>` : ''}
    <button class="btn btn-edit"   onclick="editEvent('${e.id}')">Editar</button>
    <button class="btn btn-delete" onclick="deleteEvent('${e.id}')">×</button>
  </div>
</div>`;
  }).join('');
}

function statusLabel(s) { return s === 'approved' ? 'Aprovado' : s === 'pending' ? 'Pendente' : 'Rejeitado'; }

function formatDate(iso) {
  const [y, m, d] = iso.split('-');
  return new Date(y, m-1, d).toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}

// ── Actions ─────────────────────────────────────────────────────────────────
function setStatus(id, status) {
  const ev = events.find(e => e.id === id);
  if (ev) { ev.status = status; save(); renderList(); }
}

function deleteEvent(id) {
  if (!confirm('Excluir este evento?')) return;
  events = events.filter(e => e.id !== id);
  save(); renderList();
}

function editEvent(id) {
  const ev = events.find(e => e.id === id);
  if (!ev) return;
  editingId = id;
  document.getElementById('formTitle').textContent = 'Editar Evento';
  setType(ev.type);
  document.getElementById('fDate').value      = ev.date || '';
  document.getElementById('fDay').value       = ev.recurringDay || 'saturday';
  document.getElementById('fTitlePt').value   = ev.title_pt;
  document.getElementById('fTitleEn').value   = ev.title_en;
  document.getElementById('fNotePt').value    = ev.note_pt;
  document.getElementById('fNoteEn').value    = ev.note_en;
  document.getElementById('fInstagram').value = ev.instagram || '';
  document.getElementById('fStatus').value    = ev.status;
  showTab('add');
}

function cancelForm() {
  editingId = null;
  document.getElementById('formTitle').textContent = 'Novo Evento';
  ['fDate','fTitlePt','fTitleEn','fNotePt','fNoteEn','fInstagram'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fStatus').value = 'approved';
  setType('oneoff');
  showTab('list');
}

function saveEvent() {
  const titlePt = document.getElementById('fTitlePt').value.trim();
  if (!titlePt) { alert('Título em português é obrigatório.'); return; }

  const ev = {
    id:           editingId || String(Date.now()),
    status:       document.getElementById('fStatus').value,
    type:         currentType,
    recurringDay: currentType === 'recurring' ? document.getElementById('fDay').value : null,
    date:         currentType === 'oneoff'    ? document.getElementById('fDate').value || null : null,
    title_pt:     titlePt,
    title_en:     document.getElementById('fTitleEn').value.trim(),
    note_pt:      document.getElementById('fNotePt').value.trim(),
    note_en:      document.getElementById('fNoteEn').value.trim(),
    instagram:    document.getElementById('fInstagram').value.trim()
  };

  if (editingId) {
    const idx = events.findIndex(e => e.id === editingId);
    if (idx !== -1) events[idx] = ev;
  } else {
    events.push(ev);
  }

  save();
  cancelForm();
}

// ── Type toggle ──────────────────────────────────────────────────────────────
function setType(t) {
  currentType = t;
  document.getElementById('typeOneoff').classList.toggle('active', t === 'oneoff');
  document.getElementById('typeRecurring').classList.toggle('active', t === 'recurring');
  document.getElementById('dateField').classList.toggle('hidden', t !== 'oneoff');
  document.getElementById('dayField').classList.toggle('hidden', t !== 'recurring');
}

// ── JSON export/import ───────────────────────────────────────────────────────
function renderJson() {
  const approved = events.filter(e => e.status === 'approved');
  document.getElementById('jsonOutput').value = JSON.stringify(approved, null, 2);
}

function copyJson() {
  const ta = document.getElementById('jsonOutput');
  ta.select();
  document.execCommand('copy');
  alert('JSON copiado!');
}

function importJson() {
  const raw = document.getElementById('jsonOutput').value.trim();
  try {
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) throw new Error('Deve ser um array');
    events = parsed;
    save();
    alert('Importado com sucesso!');
    showTab('list');
  } catch (e) {
    alert('JSON inválido: ' + e.message);
  }
}

// ── Init ─────────────────────────────────────────────────────────────────────
renderList();
</script>
</body>
</html>
