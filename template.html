<!doctype html>
<html lang="pt-BR">

<head>
<meta charset="utf-8">
<title>Kindle Concierge</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<header class="masthead">

    <div class="place" id="place">
        Botafogo, Rio de Janeiro
    </div>

    <div class="date" id="date">
        —
    </div>

</header>

<section class="hero">

    <div class="hero-temp">

        <span id="temp">--</span>
        <span class="deg">°</span>

    </div>

    <div class="hero-condition" id="cond">
        —
    </div>

    <div class="hero-sub" id="sub">
        —
    </div>

</section>

<section class="card">

    <div class="eyebrow">

        Próximos dias

    </div>

    <div class="forecast" id="forecast">

    </div>

</section>

<section class="card">

    <div class="eyebrow">

        Sua estadia

    </div>

    <div class="stay-line" id="stayLine">

        —

    </div>

</section>

<section class="card">

    <div class="eyebrow">

        Sua casa

    </div>

    <div class="house-grid">

        <div class="house-item">

            <div class="key">
                Wi-Fi
            </div>

            <div class="value" id="wifi">
                —
            </div>

        </div>

        <div class="house-item">

            <div class="key">
                Senha
            </div>

            <div class="value" id="password">
                —
            </div>

        </div>

        <div class="house-item">

            <div class="key">
                Check-out
            </div>

            <div class="value" id="checkoutTime">
                —
            </div>

        </div>

    </div>

</section>

<footer>

    <div id="updated">

        —

    </div>

</footer>

<script src="dashboard.js"></script>

</body>
</html>
