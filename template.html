<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="top">

    <div class="weekday">
        {{DAY}}
    </div>

    <div class="date">
        {{DATE}}
    </div>

</div>

<div class="line"></div>

<div class="greeting">

    <div class="hello">
        Olá, hóspede.
    </div>

    <div class="message">
        {{MESSAGE}}
    </div>

</div>

<div class="card">

    <div class="card-title">
        CLIMA AGORA
    </div>

    <div class="temperature">
        {{TEMP}}
    </div>

    <div class="condition">
        {{CONDITION}}
    </div>

    <div class="minmax">

        Máx {{MAX}}°
        &nbsp;&nbsp;&nbsp;&nbsp;
        Min {{MIN}}°

    </div>

</div>

<div class="card">

    <div class="card-title">
        PRÓXIMOS 3 DIAS
    </div>

    {{FORECAST}}

</div>

<div class="card">

    <div class="card-title">
        SUA ESTADIA
    </div>

    Em breve

</div>

<div class="card">

    <div class="card-title">
        EVENTOS PRÓXIMOS
    </div>

    Versão 2

</div>

</body>
</html>
