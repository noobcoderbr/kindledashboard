<!doctype html>
<html lang="pt-BR">

<head>

<meta charset="utf-8">

<title>Kindle Concierge</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<header class="masthead">

    <div class="place" id="place">Botafogo, Rio de Janeiro</div>

    <div class="date" id="date">—</div>

</header>

<section class="hero">

    <div class="hello">Olá,<br>hóspede.</div>

    <div class="hero-center">

        <div class="hero-temp" id="temp">--°</div>

        <div class="hero-icon" id="heroIcon"></div>

    </div>

    <div class="hero-details">

        <div class="hero-condition" id="cond">—</div>

        <div class="hero-sub-item" id="subFeels">—</div>

        <div class="hero-sub-item" id="subHumidity">—</div>

        <div class="hero-sub-item" id="subWind">—</div>

    </div>

</section>

<div class="forecast-wrap">

    <div class="forecast-grid" id="forecast"></div>

</div>

<div class="stay-wrap" id="stayWrap">

    <div class="stay-icon" id="stayIcon"></div>

    <div class="stay-main" id="stayMain"></div>

    <div class="stay-right" id="stayRight"></div>

</div>

<div class="bottom-duo">

    <div class="bottom-card" id="whatsappCol">

        <div class="info-left">

            <div class="info-title-row">

                <div class="info-icon" id="whatsappIcon"></div>

                <div class="eyebrow">Fale Conosco</div>

            </div>

            <div class="info-body">Precisa de ajuda? Escaneie o QR code ao lado e fale comigo.</div>

        </div>

        <div class="info-qr" id="whatsappQr"></div>

    </div>

    <div class="bottom-card">

        <div class="info-left">

            <div class="info-title-row">

                <div class="info-icon" id="wifiIcon"></div>

                <div class="eyebrow">Wi-Fi</div>

            </div>

            <div class="info-body">Escaneie para conectar automaticamente à rede.</div>

        </div>

        <div class="info-qr" id="wifiQr"></div>

    </div>

</div>

<footer>

    <div id="updated">—</div>

</footer>

<script src="icons.js"></script>

<script src="dashboard.js"></script>

</body>

</html>
