<!doctype html>
<html lang="pt-BR">

<head>

<meta charset="utf-8">

<title>Kindle Concierge</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<header class="masthead">

    <div class="place" id="place">

        Botafogo, Rio de Janeiro

    </div>

    <div class="date" id="date">

        —

    </div>

</header>

<section class="hero">

    <div class="welcome">

        <div class="hello">

            Olá, hóspede.

        </div>

    </div>

    <div class="hero-center">

        <div class="hero-temp">

            <span id="temp">--</span><span class="deg">°</span>

        </div>

        <div class="hero-condition" id="cond">—</div>

        <div class="hero-sub" id="sub">—</div>

    </div>

    <div class="hero-icon" id="heroIcon"></div>

</section>

<section class="card">

    <div class="eyebrow">

        Próximos dias

    </div>

    <div
        class="forecast-grid"
        id="forecast">

    </div>

</section>

<section class="card" id="stayCard">

    <div class="eyebrow">

        Sua estadia

    </div>

    <div class="stay-grid" id="stayGrid">

        <div class="stay-icon" id="stayIconLeft"></div>

        <div class="stay-content" id="stayContent">—</div>

        <div class="stay-icon" id="stayIconRight"></div>

    </div>

</section>

<section class="card">

    <div class="eyebrow">

        Sua casa

    </div>

    <div class="house-grid">

        <div class="house-item">

            <div class="house-icon" id="iconWifi"></div>

            <div class="key">Wi-Fi</div>

            <div class="value" id="wifi">—</div>

        </div>

        <div class="house-item">

            <div class="house-icon" id="iconLock"></div>

            <div class="key">Senha</div>

            <div class="value" id="password">—</div>

        </div>

        <div class="house-item">

            <div class="house-icon" id="iconClock"></div>

            <div class="key">Check-out</div>

            <div class="value" id="checkoutTime">—</div>

        </div>

    </div>

</section>

<footer>

    <div id="updated">

        —

    </div>

</footer>

<script src="icons.js"></script>

<script src="dashboard.js"></script>

</body>

</html>
