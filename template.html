<!doctype html>
<html lang="pt-BR">

<head>

<meta charset="utf-8">

<title>Kindle Concierge</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<header class="masthead">

    <div class="place" id="place">

        Botafogo, Rio de Janeiro

    </div>

    <div class="date" id="date">

        —

    </div>

</header>

<section class="hero">

    <div class="welcome">

        <div class="hello">

            Olá, hóspede.

        </div>

    </div>

    <div class="hero-center">

        <div class="hero-temp">

            <span id="temp">--</span><span class="deg">°</span>

        </div>

        <div class="hero-condition" id="cond">—</div>

        <div class="hero-sub" id="sub">—</div>

    </div>

    <div class="hero-icon" id="heroIcon"></div>

</section>

<section class="card">

    <div class="eyebrow">

        Próximos dias

    </div>

    <div
        class="forecast-grid"
        id="forecast">

    </div>

</section>

<section class="card" id="stayCard">

    <div class="eyebrow">

        Sua estadia

    </div>

    <div class="stay-grid" id="stayGrid">

        <div class="stay-icon" id="stayIconLeft"></div>

        <div class="stay-content" id="stayContent">—</div>

    </div>

</section>

<div class="bottom-duo">

    <section class="card bottom-card" id="whatsappCol">

        <div class="eyebrow">Fale Conosco</div>

        <div class="info-grid">

            <div class="info-icon" id="whatsappIcon"></div>

            <div class="info-text">

                <div class="info-body">Estamos aqui para ajudar! Escaneie o QR Code para falar no WhatsApp.</div>

            </div>

            <div class="info-qr" id="whatsappQr"></div>

        </div>

    </section>

    <section class="card bottom-card">

        <div class="eyebrow">Wi-Fi</div>

        <div class="info-grid">

            <div class="info-icon" id="wifiIcon"></div>

            <div class="info-text">

                <div class="info-label" id="wifiName">—</div>

                <div class="info-body">Escaneie para conectar automaticamente à rede Wi-Fi.</div>

            </div>

            <div class="info-qr" id="wifiQr"></div>

        </div>

    </section>

</div>

<footer>

    <div id="updated">

        —

    </div>

</footer>

<script src="icons.js"></script>

<script src="dashboard.js"></script>

</body>

</html>
